version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpswd
    volumes:
      - data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-database-network
  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_NAME: taskdb
      DB_USER: taskuser
      DB_PASSWORD: taskpswd
    networks:
      - backend-database-network
      - frontend-backend-network
    depends_on:
      - db
  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:5000
    networks:
      - frontend-backend-network
    depends_on:
      - backend
    ports:
      - 3000:3000

volumes:
  data:
networks:
  backend-database-network:
  frontend-backend-network:

