<!DOCTYPE html>
<html>
<head>
    <title>Update Task</title>
</head>
<body>
    <h1>Update Task</h1>
    <form method="POST">
        <input type="text" name="title" value="{{ task[1] }}" required><br>
        <textarea name="description">{{ task[2] }}</textarea><br>
        <select name="status">
            <option value="pending" {% if task[3] == 'pending' %}selected{% endif %}>Pending</option>
            <option value="in_progress" {% if task[3] == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="done" {% if task[3] == 'done' %}selected{% endif %}>Done</option>
        </select><br>
        <button type="submit">Update</button>
    </form>
    <a href="/">Back</a>
</body>
</html>
